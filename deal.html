<!-- ═══════════════════════════════════════════════════════════════════
     PAGE SCRIPT
     ═══════════════════════════════════════════════════════════════════ -->
<script type="module">
import {
  fetchDeal, fetchDealSources, fetchDealOutcomes, fetchComparables,
  fetchDiseaseIndications, fetchDiseaseAssets,
  fetchDealTimeline, fetchDealValueArc,
  renderPoster, renderScorePill, renderTimeline, renderValueArc,
  renderDiseaseContext, renderFinancials, renderCriticReviews,
  renderKeyAssets, renderScoreBreakdown, renderComparables as renderComps,
  renderSources, formatValue, formatDate, parseTAs
} from './assets/deals.js?v=20260422b'

const dealId = new URLSearchParams(window.location.search).get('id')

if (!dealId) {
  document.getElementById('loading').innerHTML =
    '<div style="text-align:center;padding:100px;font-family:var(--sans);color:var(--ink-muted);">Deal not found. <a href="deals.html" style="color:var(--gold);text-decoration:none;font-weight:600;">Browse deals &rarr;</a></div>'
} else {
  try {
    const [deal, sources, outcomes] = await Promise.all([
      fetchDeal(dealId),
      fetchDealSources(dealId),
      fetchDealOutcomes(dealId),
    ])

    document.getElementById('loading').style.display = 'none'

    if (!deal) {
      document.getElementById('loading').style.display = ''
      document.getElementById('loading').innerHTML =
        '<div style="text-align:center;padding:100px;font-family:var(--sans);color:var(--ink-muted);">Deal not found. <a href="deals.html" style="color:var(--gold);text-decoration:none;font-weight:600;">Browse deals &rarr;</a></div>'
    } else {
      // ── Page title ──
      document.title = `${deal.buyer_name} / ${deal.target_name} | Deal Intelligence`

      // ── Hero ──
      document.getElementById('deal-hero').style.display = ''
      document.getElementById('hero-poster').innerHTML = renderPoster(deal, 'featured')
      document.getElementById('hero-title').textContent = `${deal.buyer_name} / ${deal.target_name}`

      // Score pills
      document.getElementById('hero-scores').innerHTML =
        renderScorePill('critic', deal.critic_score != null ? Math.round(deal.critic_score) : null, 'Market consensus') +
        renderScorePill('outcome', deal.outcome_score != null ? Math.round(deal.outcome_score) : null,
          deal.outcome_score != null ? 'Outcome results' : `Unlocks ${parseInt(deal.close_date?.substring(0,4) || deal.announcement_date?.substring(0,4) || '2025') + 5}`)

      // Meta line
      const val = formatValue(deal.deal_value_usd_mm)
      document.getElementById('hero-meta').innerHTML =
        `${deal.deal_type || 'Acquisition'} &middot; <strong>${val}</strong> &middot; ${formatDate(deal.announcement_date)}`

      // Tags
      const tas = parseTAs(deal.therapeutic_areas)
      const tagHtml = tas.slice(0, 3).map(t => `<span class="tag t-blue">${t}</span>`).join('') +
        (deal.era_tag ? `<span class="tag t-amber">${deal.era_tag}</span>` : '') +
        (deal.deal_type ? `<span class="tag t-muted">${deal.deal_type}</span>` : '')
      document.getElementById('hero-tags').innerHTML = tagHtml

      // Summary / editorial lede
      if (deal.deal_summary) {
        document.getElementById('hero-summary').textContent = deal.deal_summary
        document.getElementById('hero-summary').style.display = ''
      }

      // Editorial lede
      if (deal.editorial_lede) {
        const ledeEl = document.createElement('div')
        ledeEl.className = 'feat-lede'
        ledeEl.textContent = deal.editorial_lede
        document.getElementById('hero-summary').after(ledeEl)
      }

      // ── Show body and footer ──
      document.getElementById('deal-body').style.display = ''
      document.getElementById('deal-footer').style.display = ''
      document.getElementById('deal-fab').style.display = ''

      // ── Outcome Timeline (from deal_timeline table) ──
      const timeline = await fetchDealTimeline(dealId)
      const timelineHtml = renderTimeline(timeline, outcomes, deal.deal_summary)
      document.getElementById('timeline').innerHTML = timelineHtml
      document.getElementById('timeline-section').style.display = ''

      // ── Value Arc (from deal_value_arc table) ──
      const valueArc = await fetchDealValueArc(dealId)
      const arcHtml = renderValueArc(valueArc)
      if (arcHtml) {
        document.getElementById('revenue-arc').innerHTML = arcHtml
        document.getElementById('revenue-section').style.display = ''
      }

      // ── Disease & Market Context ──
      const diseaseIndications = await fetchDiseaseIndications(dealId)
      const indicationIds = diseaseIndications.map(ind => ind.indication_id)
      const diseaseAssets = await fetchDiseaseAssets(indicationIds)
      const diseaseHtml = renderDiseaseContext(diseaseIndications, diseaseAssets)
      document.getElementById('disease-context').innerHTML = diseaseHtml
      document.getElementById('disease-section').style.display = ''

      // ── Deal Financials ──
      document.getElementById('financials').innerHTML = renderFinancials(deal)
      document.getElementById('financials-section').style.display = ''

      // ── Critic Reviews ──
      const reviewsHtml = renderCriticReviews(sources)
      document.getElementById('critic-reviews').innerHTML = reviewsHtml
      document.getElementById('reviews-section').style.display = ''

      // ── Key Assets ──
      const assetsHtml = renderKeyAssets(diseaseAssets)
      document.getElementById('key-assets').innerHTML = assetsHtml
      document.getElementById('assets-section').style.display = ''

      // ── Sidebar: Score Breakdown ──
      const scoreHtml = renderScoreBreakdown(outcomes, deal)
      if (scoreHtml) {
        document.getElementById('score-breakdown').innerHTML = scoreHtml
        document.getElementById('score-section').style.display = ''
      }

      // ── Sidebar: Comparables ──
      const comparables = await fetchComparables(deal)
      const compsHtml = renderComps(comparables, dealId)
      if (compsHtml) {
        document.getElementById('comparables').innerHTML = compsHtml
        document.getElementById('comparables-section').style.display = ''
      }

      // ── Sidebar: Sources ──
      const sourcesHtml = renderSources(sources)
      document.getElementById('sources').innerHTML = sourcesHtml
      document.getElementById('sources-section').style.display = ''
    }
  } catch (err) {
    console.error('Deal load error:', err)
    document.getElementById('loading').innerHTML =
      '<div style="text-align:center;padding:100px;font-family:var(--sans);color:var(--ink-muted);">Error loading deal. <a href="deals.html" style="color:var(--gold);text-decoration:none;font-weight:600;">Browse deals &rarr;</a></div>'
  }
}

// ── Nav search: redirect to deals.html with query ──
const navInput = document.getElementById('nav-search-input')
if (navInput) {
  navInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && navInput.value.trim()) {
      window.location.href = `deals.html?q=${encodeURIComponent(navInput.value.trim())}`
    }
  })
}
</script>
