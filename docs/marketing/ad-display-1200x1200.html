<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ad — AI in Pharma Compendium Display 1200×1200</title>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,600;0,6..72,700;0,6..72,800;1,6..72,300;1,6..72,400;1,6..72,600&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  @page { size: 1200px 1200px; margin: 0; }
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --black: #0a0a0a;
    --gold: #c49332;
    --white: #e8e4de;
    --gray: #6b6b6b;
    --font-display: 'Newsreader', Georgia, serif;
    --font-body: 'DM Sans', system-ui, sans-serif;
  }

  body {
    background: #222;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  .ad {
    width: 1200px;
    height: 1200px;
    background: var(--black);
    position: relative;
    overflow: hidden;
    flex-shrink: 0;
  }

  .noise {
    position: absolute;
    inset: 0;
    opacity: 0.025;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 256px 256px;
    pointer-events: none;
    z-index: 10;
  }

  .ad-border {
    position: absolute;
    inset: 32px;
    border: 1px solid rgba(196, 147, 50, 0.12);
    pointer-events: none;
    z-index: 4;
  }

  .corner {
    position: absolute;
    width: 28px;
    height: 28px;
    border-color: var(--gold);
    border-style: solid;
    opacity: 0.5;
    z-index: 5;
  }
  .corner.tl { top: 32px; left: 32px; border-width: 1px 0 0 1px; }
  .corner.tr { top: 32px; right: 32px; border-width: 1px 1px 0 0; }
  .corner.bl { bottom: 32px; left: 32px; border-width: 0 0 1px 1px; }
  .corner.br { bottom: 32px; right: 32px; border-width: 0 1px 1px 0; }

  .row-divider {
    position: absolute;
    top: 620px;
    left: 0; right: 0;
    height: 1px;
    background: linear-gradient(to right, transparent 5%, rgba(196, 147, 50, 0.1) 25%, rgba(196, 147, 50, 0.1) 75%, transparent 95%);
    z-index: 2;
  }

  .doc-glow {
    position: absolute;
    width: 600px;
    height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(196, 147, 50, 0.05) 0%, transparent 70%);
    top: 30%;
    left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
  }

  .ad-top {
    position: absolute;
    left: 0; top: 0;
    width: 100%;
    height: 620px;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 3;
  }

  .doc-wrap { position: relative; }

  .mock-doc-bg {
    position: absolute;
    width: 260px;
    height: 340px;
    background: #0d0d0d;
    border: 1px solid rgba(196, 147, 50, 0.07);
    top: 50%;
    left: 50%;
    transform: translate(-56%, -47%) rotate(-5deg);
  }

  .mock-doc {
    width: 270px;
    height: 352px;
    background: #0f0f0f;
    border: 1px solid rgba(196, 147, 50, 0.15);
    position: relative;
    z-index: 1;
  }

  .mock-top-bar { height: 5px; background: var(--gold); }
  .mock-inner { padding: 18px; }

  .ml { height: 2px; background: rgba(196, 147, 50, 0.1); margin-bottom: 6px; border-radius: 1px; }
  .ml.w90 { width: 90%; } .ml.w75 { width: 75%; } .ml.w55 { width: 55%; }
  .ml.w80 { width: 80%; } .ml.w65 { width: 65%; } .ml.w45 { width: 45%; }
  .ml.w70 { width: 70%; } .ml.w85 { width: 85%; } .ml.w40 { width: 40%; }

  .mg { height: 14px; } .mgs { height: 8px; }

  .mock-bars { display: flex; align-items: flex-end; gap: 4px; height: 44px; margin-bottom: 12px; }
  .mock-bar { flex: 1; background: rgba(196, 147, 50, 0.1); }
  .mock-bar.h1 { height: 38%; } .mock-bar.h2 { height: 62%; } .mock-bar.h3 { height: 44%; }
  .mock-bar.h4 { height: 88%; background: rgba(196, 147, 50, 0.32); }
  .mock-bar.h5 { height: 56%; }
  .mock-bar.h6 { height: 72%; background: rgba(196, 147, 50, 0.22); }
  .mock-bar.h7 { height: 48%; } .mock-bar.h8 { height: 35%; }

  .mock-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 4px; margin-bottom: 12px; }
  .mock-cell { height: 16px; background: rgba(196, 147, 50, 0.05); }
  .mock-cell.lit { background: rgba(196, 147, 50, 0.14); }

  .ad-bottom {
    position: absolute;
    left: 0; top: 620px;
    width: 100%;
    height: 580px;
    padding: 60px 80px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    z-index: 3;
  }

  .ad-label {
    font-family: var(--font-body);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--gold);
    opacity: 0.75;
    margin-bottom: 20px;
  }

  .ad-rule { width: 56px; height: 1px; background: var(--gold); opacity: 0.5; margin-bottom: 28px; }

  .ad-headline {
    font-family: var(--font-display);
    font-size: 56px;
    font-weight: 300;
    color: var(--white);
    line-height: 1.1;
    margin-bottom: 32px;
  }
  .ad-headline .em { display: block; font-style: italic; color: var(--gold); font-weight: 400; }

  .ad-stats { display: flex; gap: 10px; margin-bottom: 36px; flex-wrap: wrap; }
  .ad-stat {
    font-family: var(--font-body);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: rgba(196, 147, 50, 0.7);
    padding: 6px 14px;
    border: 1px solid rgba(196, 147, 50, 0.2);
  }

  .ad-price-row { display: flex; align-items: baseline; gap: 16px; }

  .ad-price {
    font-family: var(--font-display);
    font-size: 80px;
    font-weight: 800;
    color: var(--gold);
    line-height: 1;
    letter-spacing: -0.02em;
  }

  .ad-price-label {
    font-family: var(--font-body);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--gray);
    padding-bottom: 10px;
  }

  .ad-brand {
    position: absolute;
    bottom: 44px;
    right: 52px;
    font-family: var(--font-display);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.13em;
    text-transform: uppercase;
    color: rgba(196, 147, 50, 0.38);
    z-index: 5;
  }
</style>
</head>
<body>
<div class="ad">
  <div class="noise"></div>
  <div class="ad-border"></div>
  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>
  <div class="row-divider"></div>
  <div class="doc-glow"></div>

  <div class="ad-top">
    <div class="doc-wrap">
      <div class="mock-doc-bg"></div>
      <div class="mock-doc">
        <div class="mock-top-bar"></div>
        <div class="mock-inner">
          <div class="ml w75"></div>
          <div class="ml w90"></div>
          <div class="mgs"></div>
          <div class="mock-bars">
            <div class="mock-bar h1"></div>
            <div class="mock-bar h2"></div>
            <div class="mock-bar h3"></div>
            <div class="mock-bar h4"></div>
            <div class="mock-bar h5"></div>
            <div class="mock-bar h6"></div>
            <div class="mock-bar h7"></div>
            <div class="mock-bar h8"></div>
          </div>
          <div class="ml w55"></div>
          <div class="ml w80"></div>
          <div class="mg"></div>
          <div class="mock-grid">
            <div class="mock-cell lit"></div><div class="mock-cell"></div><div class="mock-cell lit"></div>
            <div class="mock-cell"></div><div class="mock-cell lit"></div><div class="mock-cell"></div>
          </div>
          <div class="ml w65"></div>
          <div class="ml w45"></div>
          <div class="mg"></div>
          <div class="ml w90"></div>
          <div class="ml w70"></div>
          <div class="ml w85"></div>
          <div class="mgs"></div>
          <div class="ml w40"></div>
          <div class="ml w75"></div>
          <div class="mg"></div>
          <div class="mock-grid">
            <div class="mock-cell"></div><div class="mock-cell lit"></div><div class="mock-cell"></div>
          </div>
          <div class="ml w80"></div>
          <div class="ml w55"></div>
          <div class="mg"></div>
          <div class="ml w70"></div>
          <div class="ml w90"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="ad-bottom">
    <div class="ad-label">The Pharma Closeout Research</div>
    <div class="ad-rule"></div>
    <h1 class="ad-headline">
      AI in Pharma:
      <span class="em">The Definitive Compendium</span>
    </h1>
    <div class="ad-stats">
      <span class="ad-stat">169 Pages</span>
      <span class="ad-stat">63 Use Cases</span>
      <span class="ad-stat">30-Q Diagnostic</span>
    </div>
    <div class="ad-price-row">
      <div class="ad-price">$149</div>
      <div class="ad-price-label">Launch Price</div>
    </div>
  </div>

  <div class="ad-brand">The Pharma Closeout</div>
</div>
</body>
</html>
